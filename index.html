<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini GTA-style Top-down Car Game</title>
<style>
  canvas {
    background: #87ceeb; /* sky blue background */
    display: block;
    margin: 0 auto;
    border: 2px solid #222;
  }
</style>
</head>
<body>
<canvas id="gameCanvas" width="800" height="500"></canvas>

<script>
// Canvas setup
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Player car
const player = {
    x: 100,
    y: 100,
    width: 50,
    height: 30,
    speed: 4,
    img: new Image()
};
player.img.src = 'https://i.imgur.com/6Z8E2tR.png'; // car image

// Obstacles / buildings
const obstacles = [
    {x: 200, y: 100, width: 100, height: 300},
    {x: 400, y: 50, width: 50, height: 200},
    {x: 600, y: 200, width: 150, height: 100},
];

// Collectibles
let coins = [
    {x: 150, y: 300, radius: 10, collected: false},
    {x: 500, y: 400, radius: 10, collected: false},
    {x: 700, y: 100, radius: 10, collected: false},
];

// Keyboard controls
const keys = {};
document.addEventListener('keydown', e => keys[e.key] = true);
document.addEventListener('keyup', e => keys[e.key] = false);

// Collision detection
function isColliding(rect, obj) {
    return !(rect.x + rect.width < obj.x ||
             rect.x > obj.x + obj.width ||
             rect.y + rect.height < obj.y ||
             rect.y > obj.y + obj.height);
}

function update() {
    let nextX = player.x;
    let nextY = player.y;

    if(keys['ArrowUp']) nextY -= player.speed;
    if(keys['ArrowDown']) nextY += player.speed;
    if(keys['ArrowLeft']) nextX -= player.speed;
    if(keys['ArrowRight']) nextX += player.speed;

    // Check collisions with obstacles
    const nextRect = {...player, x: nextX, y: nextY};
    let collision = obstacles.some(ob => isColliding(nextRect, ob));

    if(!collision) {
        player.x = nextX;
        player.y = nextY;
    }

    // Collect coins
    coins.forEach(c => {
        if(!c.collected) {
            const dx = (player.x + player.width/2) - c.x;
            const dy = (player.y + player.height/2) - c.y;
            if(Math.sqrt(dx*dx + dy*dy) < c.radius + Math.max(player.width, player.height)/2) {
                c.collected = true;
            }
        }
    });
}

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Draw roads
    ctx.fillStyle = '#333';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#666';
    obstacles.forEach(ob => ctx.fillRect(ob.x, ob.y, ob.width, ob.height));

    // Draw coins
    coins.forEach(c => {
        if(!c.collected){
            ctx.fillStyle = 'gold';
            ctx.beginPath();
            ctx.arc(c.x, c.y, c.radius, 0, Math.PI*2);
            ctx.fill();
        }
    });

    // Draw player car
    ctx.drawImage(player.img, player.x, player.y, player.width, player.height);
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
