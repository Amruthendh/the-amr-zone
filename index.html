<!DOCTYPE html>
<html>
<head>
<title>AMR CREATIONS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

header{
background:#000;
padding:20px;
}

h1{
color:red;
}

#game{
width:350px;
height:500px;
background:#4ec0ca;
margin:auto;
overflow:hidden;
position:relative;
border:4px solid black;
}

#bird{
width:40px;
height:40px;
background:yellow;
position:absolute;
top:200px;
left:50px;
border-radius:50%;
}

.pipe{
width:60px;
background:green;
position:absolute;
right:-60px;
}

#score{
font-size:25px;
margin:10px;
}

footer{
margin-top:20px;
}

</style>
</head>

<body>

<header>
<h1>AMR CREATIONS</h1>
<p>Flappy Bird Mini Game 🎮</p>
</header>

<h2 id="score">Score: 0</h2>

<div id="game">

<div id="bird"></div>

</div>

<footer>
Press SPACE to jump
</footer>

<script>

let bird = document.getElementById("bird");
let game = document.getElementById("game");

let birdTop = 200;
let gravity = 2;

let score = 0;
let gameOver = false;

/* gravity */

setInterval(function(){

if(gameOver) return;

birdTop += gravity;
bird.style.top = birdTop + "px";

if(birdTop > 460){
gameEnd();
}

},20);

/* jump */

document.addEventListener("keydown",function(e){

if(e.code === "Space"){

birdTop -= 50;

}

});

/* pipes */

function createPipe(){

if(gameOver) return;

let pipeTop = document.createElement("div");
let pipeBottom = document.createElement("div");

pipeTop.classList.add("pipe");
pipeBottom.classList.add("pipe");

let height = Math.floor(Math.random()*200)+50;
let gap = 150;

pipeTop.style.height = height + "px";
pipeTop.style.top = "0";

pipeBottom.style.height = (500-height-gap) + "px";
pipeBottom.style.bottom = "0";

game.appendChild(pipeTop);
game.appendChild(pipeBottom);

let pipeLeft = 350;

let move = setInterval(function(){

if(gameOver){
clearInterval(move);
return;
}

pipeLeft -= 3;

pipeTop.style.left = pipeLeft + "px";
pipeBottom.style.left = pipeLeft + "px";

/* score */

if(pipeLeft === 50){

score++;

document.getElementById("score").innerHTML="Score: "+score;

}

/* collision */

let birdRect = bird.getBoundingClientRect();
let topRect = pipeTop.getBoundingClientRect();
let bottomRect = pipeBottom.getBoundingClientRect();

if(
birdRect.left < topRect.right &&
birdRect.right > topRect.left &&
birdRect.top < topRect.bottom
){
gameEnd();
}

if(
birdRect.left < bottomRect.right &&
birdRect.right > bottomRect.left &&
birdRect.bottom > bottomRect.top
){
gameEnd();
}

if(pipeLeft < -60){
pipeTop.remove();
pipeBottom.remove();
clearInterval(move);
}

},20);

}

setInterval(createPipe,2000);

/* game end */

function gameEnd(){

gameOver = true;

alert("Game Over! Score: "+score);

location.reload();

}

</script>

</body>
</html>
